[package]
name = "mrkirdid/kore"
version = "0.1.13"
registry = "https://github.com/UpliftGames/wally-index"
realm = "shared"
license = "MIT"
exclude = ["default.project.json", "dev.project.json", "DevelopmentMaterial", "DevelopmentMaterial/**", "DevPackages", "DevPackages/**", "examples", "examples/**", "extension", "extension/**", "Packages", "Packages/**", "ServerPackages", "ServerPackages/**", "src", "src/**", "rokit.toml", "selene.toml", "TODO.md", "wally.lock", "kore-wally-test.zip"]
description = "A game framework with various utilities"

[dependencies]
